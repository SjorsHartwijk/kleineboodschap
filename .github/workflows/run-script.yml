name: Run My Javascript Script

on: [push]

jobs:
  run-code:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run JavaScript file
        # Hier koppel je het GitHub Secret aan een omgevingsvariabele
        env:
          SECRET_IN_CODE: ${{ secrets.MAPBOX_API }}
        run: node kaart.html