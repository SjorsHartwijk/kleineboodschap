name: Bluesky Monthly Summary Poster

on:
  schedule:
    - cron: '0 10 1 * *' # Elke 1e van de maand om 10:00 UTC (12:00 CEST)
  workflow_dispatch:

jobs:
  post-monthly-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.BLUESKY_IDENTIFIER }}" ] || [ -z "${{ secrets.BLUESKY_PASSWORD }}" ]; then
            echo "Missing required secrets: BLUESKY_IDENTIFIER or BLUESKY_PASSWORD"
            exit 1
          fi

      - name: Generate monthly summary post
        id: buildpost
        run: |
          prev_month=$(date -d "last month" +"%m")
          prev_year=$(date -d "last month" +"%Y")
          prev_month_prefix="${prev_year}-${prev_month}"

          case $prev_month in
            "01") month_name="Januari" ;;
            "02") month_name="Februari" ;;
            "03") month_name="Maart" ;;
            "04") month_name="April" ;;
            "05") month_name="Mei" ;;
            "06") month_name="Juni" ;;
            "07") month_name="Juli" ;;
            "08") month_name="Augustus" ;;
            "09") month_name="September" ;;
            "10") month_name="Oktober" ;;
            "11") month_name="November" ;;
            "12") month_name="December" ;;
          esac

          month_year="${month_name} ${prev_year}"

          echo "Zoek afleveringen van ${prev_month_prefix}"

          STATS=$(jq -r --arg prefix "$prev_month_prefix" '
            [.[] | select(.datum | startswith($prefix))] |
            {
              total_minutes: (map(.tijd | tonumber) | add // 0),
              count: length,
              categories: (group_by(.categorie) | map({key: .[0].categorie, value: length}) | from_entries)
            }
          ' episodes.json)

          TOTAL_MINUTES=$(echo "$STATS" | jq -r '.total_minutes')
          COUNT=$(echo "$STATS" | jq -r '.count')

          if [[ "$COUNT" -eq 0 ]]; then
            echo "Geen afleveringen gevonden voor ${prev_month_prefix}."
            echo "should_post=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          HOURS=$((TOTAL_MINUTES / 60))
          MINUTES=$((TOTAL_MINUTES % 60))

          # Bouw categorielijst met echte newlines
          CATEGORY_LINES=""
          while IFS="=" read -r cat count; do
            case $cat in
              "achtergrond") cat_nl="Achtergrond" ;;
              "nieuws")      cat_nl="Nieuws" ;;
              "interview")   cat_nl="Interview" ;;
              "reportage")   cat_nl="Reportage" ;;
              *)             cat_nl="$cat" ;;
            esac
            CATEGORY_LINES="${CATEGORY_LINES}$(printf '▸ %s %s\n' "$count" "$cat_nl")"
          done < <(echo "$STATS" | jq -r '.categories | to_entries[] | "\(.key)=\(.value)"')

          # Schrijf post naar bestand met echte newlines (geen \n escape)
          # Gebruik printf in plaats van a heredoc om YAML parsingproblemen te vermijden
          printf '%s\n' \
            "Kleine Boodschap in ${month_year}" \
            "" \
            "In ${month_year} kon je ${HOURS} uur en ${MINUTES} minuten naar Kleine Boodschap luisteren." \
            "" \
            "Er verschenen ${COUNT} afleveringen:" \
            "${CATEGORY_LINES}" \
            "#kleineboodschap #efteling" > post.txt

          echo "should_post=true" >> $GITHUB_OUTPUT

      - name: Prepare post content
        if: steps.buildpost.outputs.should_post == 'true'
        run: |
          # Gebruik EOF-delimiter om newlines in env var te bewaren
          {
            echo 'TEXT<<BSKYEOF'
            cat post.txt
            echo 'BSKYEOF'
          } >> $GITHUB_ENV

      - name: Send to Bluesky
        if: steps.buildpost.outputs.should_post == 'true'
        uses: myConsciousness/bluesky-post@v5
        with:
          text: ${{ env.TEXT }}
          identifier: ${{ secrets.BLUESKY_IDENTIFIER }}
          password: ${{ secrets.BLUESKY_PASSWORD }}
          retry-count: 5
